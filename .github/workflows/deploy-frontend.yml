name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'miniapp/frontend/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miniapp/frontend/package-lock.json

      - name: Install dependencies
        working-directory: miniapp/frontend
        run: npm ci

      - name: Build
        working-directory: miniapp/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: miniapp/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
